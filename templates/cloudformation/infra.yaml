AWSTemplateFormatVersion: "2010-09-09"
Description: >
  pytest-api-kit AWS infra — ECR + S3 (reports + static site) + CloudFront +
  CloudWatch Logs + IAM roles. Deploy once per project per AWS account.

Parameters:
  ProjectName:
    Type: String
    Default: pytest-api-kit
    Description: Used as prefix for resource names; change per project.
  ReportBucketName:
    Type: String
    Description: Globally unique S3 bucket name for test reports.

Resources:

  # --------------------------------------------------------------------------
  # ECR repository (image store)
  # --------------------------------------------------------------------------
  EcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ProjectName
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 20 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["v", "latest"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Expire untagged after 14 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 14
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # --------------------------------------------------------------------------
  # S3 bucket holding reports + static dashboard site
  # --------------------------------------------------------------------------
  ReportBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref ReportBucketName
      # CloudFront origin; CloudFront OAC is recommended in real prod.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html

  ReportBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReportBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadObjects
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${ReportBucket.Arn}/*"

  # --------------------------------------------------------------------------
  # CloudFront distribution (HTTPS + edge caching of the static site)
  # --------------------------------------------------------------------------
  CloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName} report dashboard"
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: s3-reports
            DomainName: !GetAtt ReportBucket.RegionalDomainName
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: s3-reports
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: true  # preserve ?sort=result for pytest-html

  # --------------------------------------------------------------------------
  # CloudWatch log group for Fargate task stdout
  # --------------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}"
      RetentionInDays: 30

  # --------------------------------------------------------------------------
  # IAM roles for ECS task
  # --------------------------------------------------------------------------
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ecsTaskExecutionRole-${ProjectName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ecsTaskRole-${ProjectName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: s3-and-cf
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "${ReportBucket.Arn}"
                  - !Sub "${ReportBucket.Arn}/*"
              - Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: "*"

Outputs:
  EcrRepoUri:
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepo}"
    Description: Docker image target URI for `deploy_ecs.sh build`
  ReportBucket:
    Value: !Ref ReportBucket
    Description: Set this as S3_BUCKET env var
  CloudFrontDomain:
    Value: !GetAtt CloudFront.DomainName
    Description: Public dashboard URL; set as CLOUDFRONT_DOMAIN env var
  CloudFrontDistributionId:
    Value: !Ref CloudFront
    Description: Set as CLOUDFRONT_DISTRIBUTION_ID env var for cache invalidation
  LogGroup:
    Value: !Ref LogGroup
    Description: CloudWatch Logs group receiving task stdout
  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
